kind = "mobile"
previewPath = "/grocerlens/"
title = "GrocerLens"
version = "1.0.0"
id = "artifacts/grocerlens"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/grocerlens/" ]
localPort = 23190

[services.development]
run = "pnpm --filter @workspace/grocerlens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocerlens", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/grocerlens", "run", "serve" ]

[services.env]
PORT = "23190"
BASE_PATH = "/grocerlens/"
